# nginx.conf — TEMPLATE procesado por envsubst en docker-entrypoint.sh.
# Variables que se reemplazan al arrancar el container:
#   ${BACKEND_ORIGIN}  → ej: https://api.tudominio.com
#   ${WS_ORIGIN}       → ej: wss://api.tudominio.com (auto-derivado)
#
# Para uso local sin docker, las variables se dejan tal cual y nginx las
# interpretará como literales (en local generalmente no se usa este archivo
# directo, sino `vite dev`).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ─────────────────────────────────────────────────────

    # Forzar HTTPS futuro: 1 año, incluir subdominios. Sin preload para no
    # quedar atado al registro global de browsers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # No permitir embed en iframes de otros dominios (anti-clickjacking).
    add_header X-Frame-Options "SAMEORIGIN" always;

    # No sniff de MIME types — un .txt no se ejecuta como JS aunque parezca.
    add_header X-Content-Type-Options "nosniff" always;

    # No leak del path completo a otros dominios al hacer click en links externos.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear features que la app no necesita.
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

    # CSP — connect-src incluye el origen del backend (parametrizado).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: ${BACKEND_ORIGIN}; font-src 'self' data:; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Aislamiento del browser.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # nginx NO hereda add_header del server cuando el location tiene los suyos,
    # así que repetimos TODA la lista de security headers en cada location que
    # los necesite.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: ${BACKEND_ORIGIN}; font-src 'self' data:; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # Assets versionados de Vite — cache largo (su nombre incluye hash).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # SPA fallback — toda ruta desconocida cae a index.html para que React
    # Router maneje el routing client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Esconder versión de nginx en headers/error pages.
    server_tokens off;

    # Tamaño máximo de upload coherente con multer del backend (25 MB).
    client_max_body_size 25m;

    # gzip — el cliente recibe assets comprimidos (~70% menos).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml;
}
