# nginx.conf — TEMPLATE procesado por envsubst en docker-entrypoint.sh.
# Variables que se reemplazan al arrancar el container:
#   ${BACKEND_ORIGIN}  → ej: https://api.tudominio.com
#   ${WS_ORIGIN}       → ej: wss://api.tudominio.com (auto-derivado)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 25m;

    # ─── gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml;

    # ─── Security headers (server-level) ───────────────────────────────────
    # nginx NO hereda add_header al location si el location tiene su propio
    # add_header. Por eso definimos TODAS las security headers acá Y las
    # re-aplicamos solo en los locations que necesitan headers extra.

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: ${BACKEND_ORIGIN}; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # ─── Locations ─────────────────────────────────────────────────────────

    # Assets versionados de Vite (hash en el nombre) — cache inmutable largo.
    # Repetimos las security headers porque tener `add_header Cache-Control`
    # rompe la herencia del server-level.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: ${BACKEND_ORIGIN}; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # `/` y `/index.html` deben servirse SIEMPRE frescos. Si el browser cachea
    # un index.html viejo, va a pedir bundles JS con hashes que ya no existen
    # tras un redeploy → 404. Forzar no-cache acá previene eso.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: ${BACKEND_ORIGIN}; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: ${BACKEND_ORIGIN}; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
    }

    # SPA fallback — toda otra ruta cae a index.html (también con no-cache).
    # No-cache acá protege a las rutas `/login`, `/dashboard`, etc., que
    # internamente sirven index.html.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: ${BACKEND_ORIGIN}; connect-src 'self' ${BACKEND_ORIGIN} ${WS_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri $uri/ /index.html;
    }
}
